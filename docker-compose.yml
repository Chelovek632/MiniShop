services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: MiniShop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./MiniShop
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=MiniShop_db;Username=postgres;Password=1234
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./MiniShop.Front
      dockerfile: Dockerfile
    ports:
      - "5500:80"
    depends_on:
      - backend

volumes:
  postgres_data:
