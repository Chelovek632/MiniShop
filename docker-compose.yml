version: '3.8'

services:
  db:ы
    image: postgres:16
    environment:
      POSTGRES_DB: MiniShop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: MiniShop/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=MiniShop_db;Username=postgres;Password=1234
    depends_on:
      - db

volumes:
  postgres_data: